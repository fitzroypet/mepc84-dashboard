<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Classification Map (Embed)</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="embed-page">
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <p>Loading map…</p>
  </div>

  <div id="error-screen" class="hidden">
    <div class="error-card">
      <h3>Could not load the map</h3>
      <p id="error-message"></p>
      <button id="retry-btn">Retry</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <main class="map-page">
      <section class="map-shell">
        <header class="map-header">
          <p class="map-eyebrow">Country Classification</p>
          <h1>World Classification Map</h1>
          <p class="map-description">
            A compact embedded view of the same classification map.
          </p>
        </header>

        <section class="map-card">
          <div class="map-card-header">
            <div>
              <h2>Global Overview</h2>
              <p>Each country is colored by its <code>Final Classification</code>.</p>
            </div>
            <div class="map-controls">
              <label class="filter-field" for="continent-filter">
                <span>Continent</span>
                <select id="continent-filter" name="continent-filter">
                  <option value="">All continents</option>
                </select>
              </label>
            </div>
          </div>
          <div id="chart-world-map" class="map-canvas"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="tooltip" class="tooltip hidden"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
